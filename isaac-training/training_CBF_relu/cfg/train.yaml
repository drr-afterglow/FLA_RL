defaults:
  - _self_
  - drone
  - ppo
  - sim

headless: True
device: "cuda:0"
seed: 0

# Total Training Length
max_frame_num: 1e8 # max frame 
eval_interval: 300 # evaluate the policy for every N training steps
save_interval: 300

# Training Environment
env:
  num_envs: 512 # Number of drones for training
  max_episode_length: 2200
  env_spacing: 0.0  #无人机共享环境时不需要设置间距,参数需要留存
  num_obstacles: 350

env_dyn:
  num_obstacles: 0 # set to zero if static env is needed动态障碍物数量如果设置成0则表示只需要静态障碍物
  vel_range: [0.5, 1.5]
  local_range: [5.0, 5.0, 4.5]

viewer:
  eye: [0., 40., 40.]
  lookat: [0., 2.5, 0.]
  resolution: [960, 720]

wandb:
  project: NavRL
  name: nav_CBF_test3
  entity: rongrongdeng862-jilin-university #改为自己官网的账号名，这样可以在自己的账号下看到训练过程
  mode: online # online
  run_id: #kw9xf9k9
